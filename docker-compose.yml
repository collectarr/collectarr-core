name: collectarr

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${API_PYTHON_BASE_IMAGE:-python:3.14-slim}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log
    env_file: .env
    restart: unless-stopped
    ports:
      - "8010:8000"
    volumes:
      - .:/app
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${API_PYTHON_BASE_IMAGE:-python:3.14-slim}
    command: python -m app.worker.main
    env_file: .env
    restart: unless-stopped
    volumes:
      - .:/app
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    command:
      - postgres
      - -c
      - checkpoint_timeout=15min
      - -c
      - max_wal_size=1GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - log_checkpoints=off
    environment:
      POSTGRES_DB: collectarr
      POSTGRES_USER: collectarr
      POSTGRES_PASSWORD: collectarr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collectarr -d collectarr"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  meilisearch:
    image: ${MEILI_IMAGE:-getmeili/meilisearch:v1.13}
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: collectarr-dev-key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    logging: *default-logging

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    logging: *default-logging

volumes:
  postgres_data:
  meili_data:
  minio_data:
