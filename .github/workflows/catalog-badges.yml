name: Catalog Badges

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate badge snapshots
        env:
          COLLECTARR_BADGES_BASE_URL: ${{ secrets.COLLECTARR_BADGES_BASE_URL }}
          COLLECTARR_BADGES_TOKEN: ${{ secrets.COLLECTARR_BADGES_TOKEN }}
          COLLECTARR_BADGES_EMAIL: ${{ secrets.COLLECTARR_BADGES_EMAIL }}
          COLLECTARR_BADGES_PASSWORD: ${{ secrets.COLLECTARR_BADGES_PASSWORD }}
          COLLECTARR_BADGES_PASSWORD_B64: ${{ secrets.COLLECTARR_BADGES_PASSWORD_B64 }}
        shell: bash
        run: |
          args=(--output-dir docs/badges)
          if [ -n "$COLLECTARR_BADGES_BASE_URL" ]; then
            args+=(--base-url "$COLLECTARR_BADGES_BASE_URL")
          else
            args+=(--placeholder)
          fi
          if [ -n "$COLLECTARR_BADGES_TOKEN" ]; then
            args+=(--token "$COLLECTARR_BADGES_TOKEN")
          fi
          if [ -n "$COLLECTARR_BADGES_EMAIL" ]; then
            args+=(--email "$COLLECTARR_BADGES_EMAIL")
          fi
          if [ -n "$COLLECTARR_BADGES_PASSWORD" ]; then
            args+=(--password "$COLLECTARR_BADGES_PASSWORD")
          fi
          if [ -n "$COLLECTARR_BADGES_PASSWORD_B64" ]; then
            args+=(--password-b64 "$COLLECTARR_BADGES_PASSWORD_B64")
          fi
          python scripts/generate_catalog_badges.py "${args[@]}"

      - name: Create badge refresh PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: refresh catalog badges"
          title: "docs: refresh catalog badges"
          body: |
            Automated catalog badge refresh from .github/workflows/catalog-badges.yml.
          branch: chore/catalog-badges-refresh
          delete-branch: true
          add-paths: docs/badges