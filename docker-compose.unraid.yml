name: collectarr

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app_web:
    image: ${APP_WEB_IMAGE:-ghcr.io/collectarr/collectarr-app-web:latest}
    restart: unless-stopped
    ports:
      - "${APP_WEB_PORT:-8080}:80"
    logging: *default-logging

  api:
    image: ${COLLECTARR_CORE_IMAGE:-ghcr.io/collectarr/collectarr-core:latest}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log
    restart: unless-stopped
    env_file:
      - ${COLLECTARR_ENV_FILE:-.env.unraid}
    ports:
      - "${CORE_API_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    image: ${COLLECTARR_CORE_IMAGE:-ghcr.io/collectarr/collectarr-core:latest}
    command: python -m app.worker.main
    restart: unless-stopped
    env_file:
      - ${COLLECTARR_ENV_FILE:-.env.unraid}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    logging: *default-logging

  sync:
    image: ${COLLECTARR_SYNC_IMAGE:-ghcr.io/collectarr/collectarr-sync:latest}
    command: uvicorn collectarr_sync.main:app --host 0.0.0.0 --port 8020 --no-access-log
    restart: unless-stopped
    env_file:
      - ${COLLECTARR_ENV_FILE:-.env.unraid}
    ports:
      - "${SYNC_API_PORT:-8020}:8020"
    volumes:
      - ${SYNC_DATA_DIR:-/mnt/user/appdata/collectarr/sync}:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collectarr}
      POSTGRES_USER: ${POSTGRES_USER:-collectarr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ${POSTGRES_DATA_DIR:-/mnt/user/appdata/collectarr/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collectarr} -d ${POSTGRES_DB:-collectarr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  meilisearch:
    image: ${MEILI_IMAGE:-getmeili/meilisearch:v1.13}
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ${MEILI_DATA_DIR:-/mnt/user/appdata/collectarr/meili}:/meili_data
    logging: *default-logging

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-change-me}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MINIO_DATA_DIR:-/mnt/user/appdata/collectarr/minio}:/data
    logging: *default-logging