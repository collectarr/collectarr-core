name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Preview release version
        id: semantic_preview
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release mode
        id: release_mode
        shell: bash
        run: |
          if [ "${{ steps.semantic_preview.outputs.new_release_published }}" = "true" ]; then
            echo "build_requested=true" >> "$GITHUB_OUTPUT"
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ steps.semantic_preview.outputs.new_release_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_requested=false" >> "$GITHUB_OUTPUT"
            echo "publish_release=false" >> "$GITHUB_OUTPUT"
            echo "image_tag=skip-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Set up QEMU
        if: steps.release_mode.outputs.build_requested == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.release_mode.outputs.build_requested == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.release_mode.outputs.publish_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.release_mode.outputs.build_requested == 'true'
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ steps.release_mode.outputs.publish_release == 'true' }}
            type=raw,value=${{ steps.release_mode.outputs.image_tag }}

      - name: Build and push container image
        if: steps.release_mode.outputs.build_requested == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.release_mode.outputs.publish_release == 'true' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Release
        if: steps.release_mode.outputs.publish_release == 'true'
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No release needed
        if: steps.release_mode.outputs.build_requested != 'true'
        run: echo "No releasable changes detected."
