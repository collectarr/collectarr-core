name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: collectarr_test
          POSTGRES_USER: collectarr
          POSTGRES_PASSWORD: collectarr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U collectarr -d collectarr_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -m pip check

      - name: Lint
        run: python -m ruff check .

      - name: Verify generated docs are current
        run: |
          python -m scripts.export_schema_site
          python -m scripts.export_openapi
          git diff --exit-code -- docs/schema-data.json docs/schema-full.md docs/openapi.json

      - name: Type check (informational)
        continue-on-error: true
        run: python -m mypy app

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://collectarr:collectarr@localhost:5432/collectarr_test
          SECRET_KEY: test-secret
          ENVIRONMENT: test
        run: python -m pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Prepare Compose env
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config --quiet
